spring.application.name=Backend

server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/Food_Ordering_System?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Admin Config
admin.entry-code=${ADMIN_ENTRY_CODE:change-this-entry-code}
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:change-this-password}
admin.token.expire-minutes=${ADMIN_TOKEN_EXPIRE_MINUTES:120}

# Uploaded meal image size limit
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB