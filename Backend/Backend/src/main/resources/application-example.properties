spring.application.name=Backend

server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/Food_Ordering_System?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=your_mysql_username
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

admin.entry-code=your_admin_entry_code
admin.username=your_admin_username
admin.password=your_admin_password
admin.token.expire-minutes=120

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB